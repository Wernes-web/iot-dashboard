apiVersion: apps/v1
kind: Deployment

metadata:
  name: iot-dashboard
  namespace: iot

spec:
  replicas: 1

  selector:
    matchLabels:
      app: iot-dashboard

  template:
    metadata:
      labels:
        app: iot-dashboard

    spec:
      nodeSelector:
        role: control

      containers:
      - name: iot-dashboard

        image: wernes1/iot-dashboard:d8f2f4bc20071642b93dc281a43dbd8f95bbe04e

        imagePullPolicy: Always

        ports:
        - containerPort: 3000