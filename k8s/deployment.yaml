apiVersion: apps/v1
kind: Deployment

metadata:
  name: iot-dashboard
  namespace: iot

spec:
  replicas: 1

  selector:
    matchLabels:
      app: iot-dashboard

  template:
    metadata:
      labels:
        app: iot-dashboard

    spec:
      nodeSelector:
        role: control

      containers:
      - name: iot-dashboard

        image: wernes1/iot-dashboard:f867647c0346fcd14bbe38b056b5823af44fca4f

        imagePullPolicy: Always

        ports:
        - containerPort: 3000