apiVersion: apps/v1
kind: Deployment
metadata:
  name: iot-dashboard
spec:
  replicas: 1
  selector:
    matchLabels:
      app: iot-dashboard
  template:
    metadata:
      labels:
        app: iot-dashboard
    spec:
      containers:
      - name: iot-dashboard
        image: wernes1/iot-dashboard:bd70ce1205e4a5c0c264ceec2a499997b387eb54
        imagePullPolicy: Always

        ports:
        - containerPort: 3000

---
apiVersion: v1
kind: Service
metadata:
  name: iot-dashboard
spec:
  selector:
    app: iot-dashboard

  ports:
    - port: 3000
      targetPort: 3000