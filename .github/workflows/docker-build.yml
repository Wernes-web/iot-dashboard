name: Build and Push IoT Dashboard

on:
  push:
    branches:
      - main

jobs:
  docker:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Login to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USER }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build Docker image
        run: |
          docker build -t wernes1/iot-dashboard:${{ github.sha }} .

      - name: Push Docker image
        run: |
          docker push wernes1/iot-dashboard:${{ github.sha }}

      - name: Update Kubernetes deployment
        run: |
          sed -i "s|image: .*|image: wernes1/iot-dashboard:${{ github.sha }}|" k8s/deployment.yaml

      - name: Commit updated deployment
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "actions@github.com"

          git add k8s/deployment.yaml

          git commit -m "Update dashboard image tag to ${{ github.sha }}" || echo "No changes"

          git push